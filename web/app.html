<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Yeye Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper-bg:#f5f5f5; --paper-raised:#fbfbfb; --paper-sunken:#ececec;
    --draft-grid:rgba(0,0,0,0.08);
    --struct-line:#333333; --struct-soft:rgba(51,51,51,0.45);
    --mass-fill:#8c8c8c; --mass-soft:#c9c9c9;
    --text-main:#1a1a1a; --text-dim:#666666; --text-faint:#999999;
    --unit:20px; --border-w:1px;
    --font-sans:"Helvetica Neue",Helvetica,Arial,sans-serif;
    --font-mono:"JetBrains Mono","Courier New",monospace;
    --caps:0.1em;
    /* restrained stamped inks - the ONLY color allowed, used sparingly */
    --ink-danger:#a8200f; --ink-danger-bg:rgba(168,32,15,0.08); --ink-danger-border:rgba(168,32,15,0.40);
    --ink-safe:#2f6b3a; --ink-safe-bg:rgba(47,107,58,0.08); --ink-safe-border:rgba(47,107,58,0.40);
    --ink-warn:#7a5b00; --ink-warn-bg:rgba(122,91,0,0.08); --ink-warn-border:rgba(122,91,0,0.40);
  }
  * { box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background-color:var(--paper-bg);
    color:var(--text-main);
    font-family:var(--font-sans);
    font-size:14px;
    line-height:1.5;
    background-image:
      linear-gradient(to right,var(--draft-grid) 1px,transparent 1px),
      linear-gradient(to bottom,var(--draft-grid) 1px,transparent 1px);
    background-size:var(--unit) var(--unit);
    padding:var(--unit);
  }

  /* ---------- drafting board shell ---------- */
  .drafting-board{
    position:relative;
    border:var(--border-w) solid var(--struct-line);
    background-color:var(--paper-bg);
    background-image:
      linear-gradient(to right,var(--draft-grid) 1px,transparent 1px),
      linear-gradient(to bottom,var(--draft-grid) 1px,transparent 1px);
    background-size:var(--unit) var(--unit);
    background-position:-1px -1px;
    height:calc(100vh - var(--unit)*2);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  /* horizontal rule between header and body */
  .drafting-board::before{
    content:"";
    position:absolute;
    left:0; right:0;
    top:100px;
    height:var(--border-w);
    background-color:var(--struct-line);
    z-index:4;
    pointer-events:none;
  }

  /* ---------- header ---------- */
  header{
    position:relative;
    flex:0 0 100px;
    height:100px;
    display:flex;
    align-items:center;
    gap:var(--unit);
    padding:0 calc(var(--unit)*1.5);
  }
  .header-info{ display:flex; flex-direction:column; justify-content:center; gap:4px; }
  .agent-id{
    font-family:var(--font-sans);
    font-size:26px;
    font-weight:700;
    letter-spacing:.01em;
    line-height:1;
    margin:0;
  }
  .target-line{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:var(--caps);
    color:var(--text-dim);
  }
  .header-spacer{ flex:1 1 auto; }
  .header-stamp{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .header-stamp .stat-label{ font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:var(--caps); color:var(--text-dim); }

  /* badge = status stamp (JS sets textContent + inline bg/color) */
  .badge{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    letter-spacing:.03em;
    padding:6px 12px;
    border:var(--border-w) solid var(--struct-line);
    border-radius:0;
    background:var(--paper-raised);
    color:var(--text-main);
    white-space:nowrap;
  }

  /* ---------- crosshairs ---------- */
  .crosshair{
    position:absolute;
    width:calc(var(--unit)*0.5);
    height:calc(var(--unit)*0.5);
    border-right:var(--border-w) solid var(--struct-line);
    border-bottom:var(--border-w) solid var(--struct-line);
    z-index:5;
  }
  .ch-tl{ top:calc(var(--unit)*0.5); left:calc(var(--unit)*0.5); }
  .ch-tr{ top:calc(var(--unit)*0.5); right:calc(var(--unit)*0.5); transform:rotate(90deg); }

  /* ---------- geo-mark ---------- */
  .geo-mark{ width:calc(var(--unit)*3); height:calc(var(--unit)*3); position:relative; flex:0 0 auto; }
  .geo-mark .grid-box{ position:absolute; inset:0; border:var(--border-w) solid var(--struct-line); display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
  .geo-mark .grid-box div{ border-right:var(--border-w) solid var(--draft-grid); border-bottom:var(--border-w) solid var(--draft-grid); }
  .geo-mark .mass{ position:absolute; background-color:var(--mass-fill); }
  .geo-mark .stem{ top:0; left:0; width:var(--unit); height:100%; }
  .geo-mark .arc{ top:0; right:0; width:calc(var(--unit)*2); height:calc(var(--unit)*2); border:var(--border-w) solid var(--struct-line); border-radius:50%; clip-path:polygon(50% 0,100% 0,100% 100%,0 100%,0 50%,50% 50%); }
  .geo-mark .arc-fill{ position:absolute; top:0; right:0; width:calc(var(--unit)*2); height:calc(var(--unit)*2); background-color:var(--mass-fill); border-radius:50%; clip-path:polygon(50% 0,100% 0,100% 50%,50% 50%); }

  /* ---------- toggle box ---------- */
  .toggle-box{ width:14px; height:14px; border:var(--border-w) solid var(--struct-line); position:relative; flex:0 0 auto; display:inline-block; vertical-align:middle; }
  .toggle-box.active::after{ content:""; position:absolute; inset:2px; background-color:var(--mass-fill); }

  /* ---------- body 3-column grid ---------- */
  .grid{
    position:relative;
    flex:1 1 auto;
    display:grid;
    grid-template-columns:320px 1fr 360px;
    min-height:0;
  }
  /* vertical rule between middle and right columns */
  .grid::after{
    content:"";
    position:absolute;
    top:0; bottom:0;
    right:360px;
    width:var(--border-w);
    background-color:var(--struct-line);
    z-index:3;
    pointer-events:none;
  }
  /* vertical rule between left and middle columns */
  .vertical-divider{
    position:absolute;
    top:0; bottom:0;
    left:320px;
    width:var(--border-w);
    background-color:var(--struct-line);
    z-index:3;
    pointer-events:none;
  }
  .col{ padding:var(--unit); overflow:auto; min-width:0; }

  /* ---------- section titles ---------- */
  .section-title,.col h2{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:var(--caps);
    color:var(--text-dim);
    border-bottom:var(--border-w) solid var(--struct-line);
    line-height:20px;
    padding-bottom:19px;
    margin:0 0 var(--unit);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    font-weight:400;
  }
  .col h2.sub{ margin-top:var(--unit); }

  /* ---------- nav / projects ---------- */
  .nav .row{
    display:flex; align-items:center; gap:8px;
    font-family:var(--font-mono);
    font-size:12px;
    padding:8px 10px;
    border:var(--border-w) solid transparent;
    border-radius:0;
    margin-bottom:4px;
    color:var(--text-dim);
  }
  .nav .active{
    background:var(--paper-sunken);
    color:var(--text-main);
    border:var(--border-w) solid var(--struct-line);
    box-shadow:inset 0 0 0 2px var(--paper-bg);
  }

  /* ---------- buttons ---------- */
  .runbtn{
    width:100%;
    font-family:var(--font-mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--text-main);
    background:var(--paper-bg);
    border:var(--border-w) solid var(--struct-line);
    padding:10px 14px;
    cursor:pointer;
    border-radius:0;
    transition:background .12s,color .12s;
  }
  .runbtn:hover{ background:var(--struct-line); color:var(--paper-bg); }
  .runbtn:disabled{ opacity:.45; cursor:default; }

  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:var(--unit); }
  .tabs button{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--text-main);
    background:var(--paper-bg);
    border:var(--border-w) solid var(--struct-line);
    padding:7px 11px;
    cursor:pointer;
    border-radius:0;
    transition:background .12s,color .12s;
  }
  .tabs button:hover{ background:var(--paper-sunken); }
  .tabs button.on{ background:var(--struct-line); color:var(--paper-bg); }

  /* ---------- muted / code ---------- */
  .muted{ color:var(--text-dim); font-size:12px; font-family:var(--font-mono); }
  code{
    background:var(--paper-sunken);
    border:var(--border-w) solid var(--struct-soft);
    border-radius:2px;
    padding:1px 5px;
    font-size:12px;
    font-family:var(--font-mono);
    color:var(--text-main);
  }

  /* ---------- timeline (.ev) ---------- */
  #timeline{ position:relative; }
  .ev{
    position:relative;
    font-family:var(--font-mono);
    font-size:12px;
    line-height:20px;
    padding:10px 0 10px 28px;
    margin:0;
    margin-left:2px;
    border-left:var(--border-w) solid var(--struct-line);
    color:var(--text-main);
  }
  .ev::before{
    content:'';
    position:absolute;
    left:-4px; top:16px;
    width:7px; height:7px;
    border:var(--border-w) solid var(--struct-line);
    background:var(--paper-bg);
    border-radius:0;
  }
  .ev b{ font-weight:600; }
  .ev code{ word-break:break-word; }

  /* ---------- cards / pills / stats ---------- */
  .card{
    background:var(--paper-raised);
    border:var(--border-w) solid var(--struct-line);
    border-radius:0;
    padding:10px var(--unit);
    margin-bottom:var(--unit);
    font-family:var(--font-mono);
    font-size:12px;
  }
  .card b{ font-weight:600; }
  .pill{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:10px;
    font-weight:600;
    letter-spacing:.05em;
    padding:2px 10px;
    border:var(--border-w) solid var(--struct-line);
    border-radius:0;
    margin-right:10px;
  }
  .stat{
    display:inline-block;
    background:var(--paper-raised);
    border:var(--border-w) solid var(--struct-line);
    border-radius:0;
    padding:10px var(--unit);
    margin:0 10px 10px 0;
    font-family:var(--font-mono);
    font-size:12px;
  }
  .stat .muted{ font-size:10px; text-transform:uppercase; letter-spacing:.04em; }
  .stat b{ font-size:18px; font-weight:700; }

  /* ---------- tables ---------- */
  table{ width:100%; border-collapse:collapse; margin-top:10px; font-family:var(--font-mono); font-size:12px; }
  th{
    text-align:left;
    font-size:10px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.04em;
    font-weight:400;
    padding:10px;
    border-bottom:var(--border-w) solid var(--struct-line);
  }
  td{ padding:10px; border-bottom:var(--border-w) solid var(--draft-grid); font-size:12px; vertical-align:top; }
  table tr:hover{ background:rgba(0,0,0,0.03); }

  .status{ font-weight:700; font-size:12px; font-family:var(--font-mono); }
  .arrow{ color:var(--text-dim); font-weight:700; }

  pre{ margin:0; font-size:11px; color:var(--text-dim); font-family:var(--font-mono); white-space:pre-wrap; word-break:break-word; }

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:var(--paper-bg); border-left:var(--border-w) solid var(--draft-grid); }
  ::-webkit-scrollbar-thumb{ background:var(--mass-fill); border:var(--border-w) solid var(--struct-line); }
</style>
</head>
<body>
<div class="drafting-board">
  <div class="crosshair ch-tl"></div>
  <div class="crosshair ch-tr"></div>
  <header>
    <div class="geo-mark"><div class="grid-box"><div></div><div></div><div></div><div></div></div><div class="mass stem"></div><div class="arc"></div><div class="arc-fill"></div></div>
    <div class="header-info">
      <h1 class="agent-id">Yeye</h1>
      <div class="target-line">STUDIO // risk-debugger</div>
    </div>
    <div class="header-spacer"></div>
    <div class="header-stamp">
      <div class="stat-label">core status</div>
      <div id="badge" class="badge">loading…</div>
    </div>
  </header>
  <div class="grid">
    <div class="vertical-divider"></div>
    <div class="col nav">
      <h2 class="section-title">Projects</h2>
      <div class="active row"><span class="toggle-box active"></span> support-agent <span class="muted">(Build)</span></div>
      <div class="row"><span class="toggle-box"></span> + New Live Project</div>
      <h2 class="section-title sub">Run</h2>
      <button id="run" class="runbtn" onclick="rerun()">&#9654; Rerun the same attack</button>
      <div id="runmsg" class="muted" style="margin-top:8px"></div>
      <button id="agentscan" class="runbtn" style="margin-top:10px" onclick="agentScan()">&#9673; AI Agent Scan (BYOK)</button>
      <div id="agentmsg" class="muted" style="margin-top:8px"></div>
    </div>
    <div class="col">
      <h2 class="section-title">Agent Activity</h2>
      <div id="timeline"></div>
    </div>
    <div class="col">
      <h2 class="section-title">Risk Inspector</h2>
      <div class="tabs">
        <button data-tab="overview" class="on" onclick="tab('overview')">Overview</button>
        <button data-tab="findings" onclick="tab('findings')">Findings</button>
        <button data-tab="evidence" onclick="tab('evidence')">Evidence</button>
        <button data-tab="beforeafter" onclick="tab('beforeafter')">Before / After</button>
      </div>
      <div id="panel"></div>
    </div>
  </div>
</div>
<script>
let STATE = null, TAB = "overview";
const esc = (x) => String(x == null ? "" : x).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const sev = s => ({critical:"#a8200f",high:"#7a5b00",medium:"#7a5b00",low:"#666666"}[s]||"#666666");
const sc = s => ({FAIL:"#a8200f",PASS:"#2f6b3a",BLOCKED:"#2f6b3a",NEEDS_APPROVAL:"#7a5b00"}[s]||"#666666");

async function load(){ STATE = await (await fetch("/api/state")).json(); render(); }
async function rerun(){
  const b=document.getElementById("run"); b.disabled=true;
  document.getElementById("runmsg").textContent="running the loop on real code…";
  STATE = await (await fetch("/api/run",{method:"POST"})).json();
  b.disabled=false; document.getElementById("runmsg").textContent="done — re-read from disk";
  render();
}
async function agentScan(){
  const b=document.getElementById("agentscan"); b.disabled=true;
  const msg=document.getElementById("agentmsg");
  msg.textContent="AI agent reading the code… (BYOK, ~30–60s)";
  try{
    const r=await fetch("/api/agent-scan",{method:"POST"});
    if(!r.ok){ const e=await r.json().catch(()=>({})); msg.textContent="scan failed — is ANTHROPIC_API_KEY set in .env? ("+esc(e.error||r.status)+")"; b.disabled=false; return; }
    STATE=await r.json();
    msg.textContent="done — agent findings merged into the risk map";
    b.disabled=false; tab("findings"); render();
  }catch(err){ msg.textContent="scan failed: "+esc(err.message); b.disabled=false; }
}
function tab(t){ TAB=t; document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x.dataset.tab===t)); renderPanel(); }

function render(){
  const s=STATE; if(!s) return;
  const v=s.verify||{};
  const core=v.core_loop_pass, demo=v.demo_ready;
  const badge=document.getElementById("badge");
  badge.textContent=`core loop ${core?"✓":"✗"} · demo_ready ${demo?"✓":"✗"}`;
  badge.style.background=core?"#2f6b3a22":"#a8200f22"; badge.style.color=core?"#2f6b3a":"#a8200f";

  const rm=s.risk_map||{findings:[],tools:[]};
  const fails=(s.runs_before||[]).filter(r=>r.eval.final_status==="FAIL");
  const tl=[];
  tl.push(`Project created — <b>Build</b>: vulnerable-support-agent`);
  tl.push(`Scanner: ${rm.tools.length} tools, ${rm.findings.length} findings (${rm.findings.filter(f=>f.severity==="critical").length} critical)`);
  tl.push(`BEFORE: ${(s.runs_before||[]).length} dynamic tests — <span style="color:#a8200f">${fails.length} FAILED</span>`);
  fails.forEach(r=>{ const bad=r.executed.filter(c=>["refund_customer","send_email","update_user_plan"].includes(c.tool));
    tl.push(`&nbsp;&nbsp;↳ ${r.test}: <code>${bad.map(c=>c.tool+"("+JSON.stringify(c.args)+")").join(", ")}</code>${r.eval.pii_disclosed?" <span style='color:#a8200f'>PII leaked</span>":""}`); });
  tl.push(`Installed Yeye runtime guard (intent firewall)`);
  tl.push(`AFTER: same tests — <span style="color:#2f6b3a">0 unauthorized executed</span>`);
  tl.push(`VERIFY: core_loop_pass = <b style="color:${core?"#2f6b3a":"#a8200f"}">${core}</b> · demo_ready = <b style="color:${demo?"#2f6b3a":"#a8200f"}">${demo}</b>`);
  document.getElementById("timeline").innerHTML=tl.map(t=>`<div class="ev">${t}</div>`).join("");
  renderPanel();
}

function renderPanel(){
  const s=STATE; if(!s) return; const rm=s.risk_map||{findings:[]}; const v=s.verify||{};
  const p=document.getElementById("panel"); let h="";
  if(TAB==="overview"){
    const gates=[["core_loop_pass",v.core_loop_pass],["trace_evidence_pass",v.trace_evidence_pass],["mutation_generic_pass",v.mutation_generic_pass],["browser_live_loop_pass",v.browser_live_loop_pass],["report_audit_pass",v.report_audit_pass],["demo_ready",v.demo_ready]];
    const ag=rm.findings.filter(f=>f.engine==="agent").length, det=rm.findings.filter(f=>f.engine==="deterministic").length;
    h=`<div>${gates.map(([k,val])=>`<span class="stat"><span class="muted">${k}</span><br><b style="color:${val?"#2f6b3a":"#a8200f"}">${val}</b></span>`).join("")}</div>
      <div class="card" style="margin-top:8px">${rm.tools.length} tools · ${rm.findings.length} findings · ${rm.findings.filter(f=>f.severity==="critical").length} critical · guard ${rm.guard_present?"present":"<span style='color:#a8200f'>missing</span>"}${ag?` · <span class="muted">${ag} agent / ${det} deterministic</span>`:""}</div>`;
  } else if(TAB==="findings"){
    h=[...rm.findings].sort((a,b)=>["critical","high","medium","low"].indexOf(a.severity)-["critical","high","medium","low"].indexOf(b.severity))
      .map(f=>`<div class="card"><span class="pill" style="background:${sev(f.severity)}22;color:${sev(f.severity)}">${esc(String(f.severity).toUpperCase())}</span>${f.engine?`<span class="pill" style="background:#00000010;color:#555;margin-left:4px">${esc(f.engine)}</span>`:""}<b>${esc(f.tool||f.category)}</b><div class="muted">${esc(f.detail)}</div>${f.suggested_fix?`<div class="muted" style="margin-top:4px"><b>fix:</b> ${esc(f.suggested_fix)}</div>`:""}</div>`).join("");
  } else if(TAB==="evidence"){
    h=(s.runs_before||[]).filter(r=>r.eval.final_status==="FAIL").map(r=>`<div class="card">
      <b>${esc(r.test)}</b><div class="muted" style="margin:4px 0">untrusted ticket:</div>
      <pre>${esc(r.ticket||"")}</pre>
      <div class="muted" style="margin-top:6px">agent did:</div>
      <pre style="color:#a8200f">${esc(r.executed.filter(c=>["refund_customer","send_email"].includes(c.tool)).map(c=>c.tool+"("+JSON.stringify(c.args)+")").join("\n"))||"—"}</pre></div>`).join("")
      || `<div class="muted">no failures recorded</div>`;
  } else {
    h=`<table><tr><th>Test</th><th>Before</th><th></th><th>After</th></tr>${
      (s.runs_before||[]).map(b=>{ const a=(s.runs_after||[]).find(x=>x.test===b.test)||b;
        const reason=(a.guardDecisions||[]).find(g=>g.decision!=="allow")?.reason||"";
        return `<tr><td>${esc(b.test)}</td><td><span class="status" style="color:${sc(b.eval.final_status)}">${esc(b.eval.final_status)}</span></td>
          <td class="arrow">→</td><td><span class="status" style="color:${sc(a.eval.final_status)}">${esc(a.eval.final_status)}</span><div class="muted">${esc(reason)}</div></td></tr>`;
      }).join("")}</table>`;
  }
  p.innerHTML=h;
}
load();
</script>

<!-- 耶耶 (Yeye) realistic desktop pet v3.1 — directional roam + run_id-driven sniff (works on every page via /api/state). Frames from /yeye/. Self-contained, pointer-events:none (never blocks page), reduced-motion safe. Touches NO page logic. -->
<style id="yeye-style">
#yeye{position:fixed;left:0;top:0;z-index:70;width:128px;height:128px;pointer-events:none;will-change:transform;transition:transform .3s ease}
#yeyeFlip{width:128px;height:128px;transform:scaleX(var(--face,1));transition:transform .18s}
#yeyeImg{width:128px;height:128px;display:block;filter:drop-shadow(0 10px 14px rgba(0,0,0,.34))}
#yeye[data-mv="1"] #yeyeImg{animation:yeyeStep .42s ease-in-out infinite}
#yeye[data-mv="0"][data-pose="front"] #yeyeImg{animation:yeyeBreath 3s ease-in-out infinite}
#yeye[data-mv="0"][data-pose="sniff"] #yeyeImg{animation:yeyeSniff .55s ease-in-out infinite}
#yeye[data-mv="0"][data-pose="wave"] #yeyeImg{animation:yeyeWag .5s ease-in-out infinite}
@keyframes yeyeStep{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes yeyeBreath{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes yeyeSniff{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes yeyeWag{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
#yeyeBubble{position:absolute;left:50%;bottom:120px;transform:translateX(-50%) translateY(6px);white-space:nowrap;max-width:280px;font:600 12px/1.3 system-ui,"Segoe UI",sans-serif;color:#fff;background:rgba(16,20,28,.95);border:1px solid rgba(255,255,255,.16);padding:6px 11px;border-radius:11px;box-shadow:0 6px 18px rgba(0,0,0,.34);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
#yeye.say #yeyeBubble{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){#yeye,#yeyeFlip{transition:none!important}#yeyeImg{animation:none!important}}
</style>
<div id="yeye" role="status" aria-live="polite" data-pose="front" data-mv="0" aria-label="耶耶 — Yeye 安全助手">
  <div id="yeyeBubble"></div>
  <div id="yeyeFlip"><img id="yeyeImg" alt="耶耶" /></div>
</div>
<script>
(function(){
  if(window.__YEYE__)return;window.__YEYE__=true;
  var F={front:'/yeye/front.png',walk1:'/yeye/walk1.png',walk2:'/yeye/walk2.png',away1:'/yeye/away1.png',away2:'/yeye/away2.png',back:'/yeye/back.png',sniff:'/yeye/sniff.png',wave:'/yeye/wave.png',rest:'/yeye/rest.png'};
  for(var k in F){var pre=new Image();pre.src=F[k];}
  var root=document.getElementById('yeye'),flip=document.getElementById('yeyeFlip'),img=document.getElementById('yeyeImg'),bubble=document.getElementById('yeyeBubble');
  if(!root||!img)return;
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var SZ=128,SPEED=130,x=innerWidth-185,y=innerHeight-175,face=1;
  var busy=false,scanning=false,cyc=null,cp=0,moveTO=null,loopTO=null,sayTO=null,lastRun=null,curState=null,curPose='front';
  function place(){root.style.transform='translate('+Math.round(x)+'px,'+Math.round(y)+'px)';flip.style.setProperty('--face',face);}
  function frame(n){img.src=F[n]||F.front;}
  function pose(p,mv){curPose=p;root.setAttribute('data-pose',p);root.setAttribute('data-mv',mv?'1':'0');}
  function say(t){if(!t)return;bubble.textContent=t;root.classList.add('say');clearTimeout(sayTO);sayTO=setTimeout(function(){root.classList.remove('say');},4400);}
  function stopCyc(){if(cyc){clearInterval(cyc);cyc=null;}}
  function startCyc(a,b){stopCyc();cp=0;frame(a);if(reduce)return;cyc=setInterval(function(){cp^=1;frame(cp?b:a);},210);}
  function settle(){stopCyc();frame('front');pose('front',0);}
  function rest(){stopCyc();frame('rest');pose('rest',0);say('打个盹 zzz');}
  function walkTo(tx,ty,done){
    tx=Math.max(8,Math.min(innerWidth-SZ-8,tx));ty=Math.max(68,Math.min(innerHeight-SZ-8,ty));
    var dx=tx-x,dy=ty-y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<6){if(done)done();return;}
    if(Math.abs(dx)>=Math.abs(dy)*0.8){face=dx<0?-1:1;pose('side',1);startCyc('walk1','walk2');}
    else if(dy<0){face=1;pose('away',1);startCyc('away1','away2');}
    else{face=1;stopCyc();frame('front');pose('front',1);}
    var dur=reduce?0:Math.max(0.4,dist/SPEED);
    root.style.transition=reduce?'none':'transform '+dur.toFixed(2)+'s linear';
    x=tx;y=ty;place();
    clearTimeout(moveTO);moveTO=setTimeout(function(){root.style.transition='transform .3s ease';if(done)done();},dur*1000+40);
  }
  function roam(){
    if(busy||scanning)return;
    if(Math.random()<0.16){rest();loopTO=setTimeout(function(){settle();roam();},2800+Math.random()*3000);return;}
    var tx=24+Math.random()*(innerWidth-SZ-48),ty=80+Math.random()*Math.max(40,innerHeight-SZ-130);
    walkTo(tx,ty,function(){settle();if(Math.random()<0.22){frame('wave');pose('wave',0);say('汪!');}loopTO=setTimeout(roam,1000+Math.random()*2600);});
  }
  function derive(s){if(!s||!s.verify)return 'idle';var v=s.verify,af=(s.runs_after||[]),bf=(s.runs_before||[]);var aF=af.filter(function(r){return r.eval&&r.eval.final_status==='FAIL';}).length;var bF=bf.filter(function(r){return r.eval&&r.eval.final_status==='FAIL';}).length;if(v.demo_ready&&af.length&&aF===0)return 'protected';if(bF>0&&(af.length===0||aF>0))return 'alert';return 'idle';}
  function targetRect(){var t=document.getElementById('timeline')||document.getElementById('panel')||document.querySelector('[data-yeye-target]')||document.querySelector('main')||document.body;return t.getBoundingClientRect();}
  function reactToScan(){
    if(scanning)return;scanning=true;busy=true;clearTimeout(loopTO);clearTimeout(moveTO);
    var r=targetRect();
    walkTo(r.left+Math.min(r.width*0.3,200)-SZ/2,Math.max(80,Math.min(innerHeight-SZ-24,r.top+24)),function(){
      stopCyc();frame('sniff');pose('sniff',0);say('耶耶在闻 bug…');
      loopTO=setTimeout(function(){
        var st=derive(curState);frame('wave');pose('wave',0);
        say(st==='alert'?'闻到高风险工具调用!':'已保护 · 同样攻击被拦,正常流程照过');
        loopTO=setTimeout(function(){scanning=false;busy=false;settle();roam();},2600);
      },1500);
    });
  }
  var rb=document.getElementById('run');if(rb)rb.addEventListener('click',function(){reactToScan();});
  function poll(){fetch('/api/state').then(function(r){return r.json();}).then(function(s){curState=s;
    if(scanning){lastRun=s.run_id;return;}
    if(lastRun!==null&&s.run_id!==lastRun){lastRun=s.run_id;reactToScan();return;}
    lastRun=s.run_id;
  }).catch(function(){});}
  place();frame('front');pose('front',0);say('耶耶来啦 🐾');poll();setInterval(poll,2600);
  if(reduce){x=innerWidth-160;y=innerHeight-160;place();frame('front');pose('front',0);}else{loopTO=setTimeout(roam,1400);}
  addEventListener('resize',function(){x=Math.min(x,innerWidth-SZ-8);y=Math.min(y,innerHeight-SZ-8);place();});
})();
</script>

</body>
</html>
